<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analītikas Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --glass: rgba(255, 255, 255, 0.4);
    --glass-border: rgba(255, 255, 255, 0.5);
    --text-color: #1e293b;
    --accent-purple: #7c5cbf;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(-45deg, #a78bfa, #23a6d5, #23d5ab, #f0fdf4);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    max-width: 850px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 30px;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(10px);
    padding: 12px 30px;
    border-radius: 50px;
    border: 1px solid var(--glass-border);
    display: inline-block;
  }

  h1 {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 800;
    color: #334155; 
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--glass);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 25px;
    text-align: left;
    transition: all 0.4s ease;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.5);
    border-color: white;
  }

  .icon {
    font-size: 32px;
    margin-bottom: 15px;
    background: white;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  h2 {
    font-size: 18px;
    color: #1e293b;
    margin: 0 0 10px 0;
  }

  p {
    font-size: 13px;
    line-height: 1.6;
    color: #475569;
    margin-bottom: 20px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: white;
    color: var(--accent-purple);
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    border: 1px solid rgba(124, 92, 191, 0.2);
  }

  .btn:hover {
    background: var(--accent-purple);
    color: white;
  }

  footer {
    margin-top: 30px;
    font-size: 11px;
    color: #64748b;
    background: rgba(255, 255, 255, 0.4);
    padding: 8px 20px;
    border-radius: 30px;
    display: inline-block;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Datu analītikas portfolio</h1>
  </header>

  <div class="grid">
    <div class="card">
      <div>
        <div class="icon">📈</div>
        <h2>Nordtech Analytics</h2>
        <p>Interaktīvs biznesa datu panelis (Python/Streamlit). 1. moduļa noslēguma darbs BDA-MI skolā.</p>
      </div>
      <a href="https://nordtech-analytics-dashboard-nkmnwmcp9ofocy4ukg3n6a.streamlit.app/" target="_blank" class="btn">Atvērt projektu</a>
    </div>

    <div class="card">
      <div>
        <div class="icon">🤗</div>
        <h2>Hugging Face Hub</h2>
        <p>Datu modeļu krātuve un analītikas eksperimenti.</p>
      </div>
      <a href="https://huggingface.co/spaces/Meitene/nvd-f17-analitika" target="_blank" class="btn">Skatīt modeļus</a>
    </div>
  </div>

  <footer>
    Lepni reklamēju <strong>BDA-MI skolu</strong> par izcilo apmācību!
  </footer>
</div>

</body>
</html>
